<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Copilot CLI usage</title>
<style>
  :root {
    --bg:#0f1419; --panel:#171c24; --panel2:#1e2530; --line:#2a3340;
    --fg:#e6edf3; --muted:#8b97a7; --accent:#7aa2f7; --accent2:#9ece6a;
    --credit:#e0af68; --bar:#2d3a52;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg);
    font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
  header { position:sticky; top:0; z-index:5; background:var(--panel);
    border-bottom:1px solid var(--line); padding:12px 18px; display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
  h1 { font-size:16px; margin:0; font-weight:650; }
  .spacer { flex:1; }
  button { background:var(--panel2); color:var(--fg); border:1px solid var(--line);
    border-radius:8px; padding:7px 14px; cursor:pointer; font-size:13px; }
  button:hover { border-color:var(--accent); }
  button.primary { background:var(--accent); color:#0b0f16; border-color:var(--accent); font-weight:600; }
  .tabs { display:flex; gap:6px; }
  .tab { padding:6px 14px; border-radius:8px; cursor:pointer; color:var(--muted);
    background:none; border:none; font:inherit; font-size:14px; }
  .tab:hover { color:var(--fg); }
  .tab.active { background:var(--panel2); color:var(--fg); }
  .meta { color:var(--muted); font-size:12px; }
  .range { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .range label { color:var(--muted); font-size:12px; }
  select, input[type="date"], input[type="datetime-local"] { background:var(--panel2); color:var(--fg);
    border:1px solid var(--line); border-radius:8px; padding:6px 10px; font-size:13px;
    font-family:inherit; }
  select:hover, input[type="date"]:hover, input[type="datetime-local"]:hover { border-color:var(--accent); }
  input[type="date"], input[type="datetime-local"] { color-scheme:dark; }
  .ts { color:var(--muted); font-size:11px; font-variant-numeric:tabular-nums; white-space:nowrap; }
  main { padding:18px; max-width:1100px; margin:0 auto; }
  .chips { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:18px; }
  .chip { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:10px 14px; }
  .chip b { display:block; font-size:19px; }
  .chip span { color:var(--muted); font-size:12px; }
  details { background:var(--panel); border:1px solid var(--line); border-radius:10px; margin:8px 0; overflow:hidden; }
  details > details { margin:8px; }
  summary { cursor:pointer; padding:11px 14px; display:flex; align-items:center; gap:12px; list-style:none; }
  summary::-webkit-details-marker { display:none; }
  summary::before { content:"▸"; color:var(--muted); transition:transform .15s; }
  details[open] > summary::before { transform:rotate(90deg); }
  .name { font-weight:600; }
  .name.sub { font-weight:500; }
  .grow { flex:1; }
  .nums { display:flex; gap:14px; align-items:center; color:var(--muted); font-variant-numeric:tabular-nums; }
  .nums .credit { color:var(--credit); }
  .nums .dur { color:var(--accent2); }
  .bar { height:6px; background:var(--bar); border-radius:4px; overflow:hidden; width:120px; }
  .bar > i { display:block; height:100%; background:var(--accent); }
  .skill-row { display:flex; align-items:center; gap:12px; padding:8px 14px 8px 38px; border-top:1px solid var(--line); }
  table { width:100%; border-collapse:collapse; background:var(--panel); border:1px solid var(--line); border-radius:10px; overflow:hidden; }
  th, td { text-align:left; padding:9px 12px; border-bottom:1px solid var(--line); font-variant-numeric:tabular-nums; }
  th { color:var(--muted); font-weight:600; font-size:12px; text-transform:uppercase; letter-spacing:.04em; }
  td.num, th.num { text-align:right; }
  h2 { font-size:14px; color:var(--muted); margin:24px 0 8px; text-transform:uppercase; letter-spacing:.05em; }
  .empty { color:var(--muted); padding:40px; text-align:center; }
  .callout { background:var(--panel); border:1px solid var(--line); border-left:3px solid var(--accent);
    border-radius:10px; padding:11px 14px; margin:0 0 14px; color:var(--muted); font-size:12.5px; }
  .callout summary { padding:0; gap:8px; color:var(--fg); font-weight:600; }
  .callout[open] { padding-bottom:6px; }
  .callout dl { margin:10px 0 2px; display:grid; grid-template-columns:auto 1fr; gap:4px 12px; }
  .callout dt { color:var(--fg); font-weight:600; font-variant-numeric:tabular-nums; white-space:nowrap; }
  .callout dd { margin:0; }
  .callout code { background:var(--panel2); border:1px solid var(--line); border-radius:5px;
    padding:1px 5px; color:var(--fg); font-size:12px; }
  .hidden { display:none; }
  th.sortable { cursor:pointer; user-select:none; white-space:nowrap; }
  th.sortable:hover { color:var(--fg); }
  th.sortable:focus-visible { outline:2px solid var(--accent); outline-offset:-2px; color:var(--fg); }
  th.sortable .arrow { font-size:9px; margin-left:4px; opacity:.35; }
  th.sortable.sorted { color:var(--fg); }
  th.sortable.sorted .arrow { opacity:1; color:var(--accent); }
  .filterbar { display:flex; align-items:center; gap:10px; margin:0 0 4px; }
  .filterbar input { flex:1; max-width:320px; background:var(--panel2); color:var(--fg);
    border:1px solid var(--line); border-radius:8px; padding:7px 11px; font-size:13px; font-family:inherit; }
  .filterbar input:focus { outline:none; border-color:var(--accent); }
  .filterbar .meta { white-space:nowrap; }
  tr.filtered { display:none; }
  .pager { display:flex; align-items:center; gap:10px; margin:10px 0; }
  .pager button { padding:5px 12px; font-size:13px; }
  .pager button:disabled { opacity:.4; cursor:default; border-color:var(--line); }
  .repofilter { margin:0 0 14px; }
  .repofilter > summary { color:var(--fg); font-weight:600; }
  .repofilter .menu { display:flex; flex-direction:column; gap:6px; max-height:260px;
    overflow:auto; padding:10px 14px; border-top:1px solid var(--line); }
  .repofilter .menu-actions { display:flex; gap:8px; margin-bottom:4px; }
  .repofilter .menu-actions button { padding:3px 10px; font-size:12px; }
  .repofilter label { display:flex; align-items:center; gap:8px; cursor:pointer; font-weight:400; }
  .repofilter label input { accent-color:var(--accent); }
  .chips-range { font-size:11px; color:var(--muted); margin-bottom:14px; margin-top:-10px; }
  .child-badge { font-size:11px; color:var(--muted);
    background:var(--panel2); border:1px solid var(--line); border-radius:5px;
    padding:1px 6px; margin-left:4px; white-space:nowrap; }
  .child-session summary { opacity:.7; }
  .child-session .credit { color:var(--muted) !important; }
  .sessfilterbar { display:flex; align-items:center; gap:10px; margin:0 0 8px; }
  .sessfilterbar input { flex:1; max-width:360px; background:var(--panel2); color:var(--fg);
    border:1px solid var(--line); border-radius:8px; padding:7px 11px; font-size:13px; font-family:inherit; }
  .sessfilterbar input:focus { outline:none; border-color:var(--accent); }
  .sessfilterbar .meta { white-space:nowrap; }
  .sess-id { background:var(--panel2); border:1px solid var(--line); border-radius:4px;
    padding:1px 5px; font-size:11px; color:var(--muted); font-family:monospace;
    cursor:pointer; white-space:nowrap; }
  .sess-id:hover { border-color:var(--accent); color:var(--fg); }
  .view-tasks-btn { padding:2px 8px; font-size:11px; white-space:nowrap; }
  .tasksfilterbar { display:flex; align-items:center; gap:10px; margin:0 0 8px; }
  .tasksfilterbar input { flex:1; max-width:420px; background:var(--panel2); color:var(--fg);
    border:1px solid var(--line); border-radius:8px; padding:7px 11px; font-size:13px;
    font-family:monospace; }
  .tasksfilterbar input:focus { outline:none; border-color:var(--accent); }
  .tasksfilterbar .meta { white-space:nowrap; }
</style>
</head>
<body>
<header>
  <h1>⚡ Copilot CLI usage</h1>
  <div class="tabs" role="tablist">
    <button class="tab active" role="tab" aria-selected="true" tabindex="0" data-tab="usage">Usage</button>
    <button class="tab" role="tab" aria-selected="false" tabindex="-1" data-tab="sessions">Sessions</button>
    <button class="tab" role="tab" aria-selected="false" tabindex="-1" data-tab="tasks">Tasks</button>
    <button class="tab" role="tab" aria-selected="false" tabindex="-1" data-tab="stats">Stats</button>
  </div>
  <div class="spacer"></div>
  <div class="range">
    <label for="range-preset">Timeline</label>
    <select id="range-preset">
      <option value="all">All time</option>
      <option value="1h">Last 1 hour</option>
      <option value="1d">Last 1 day</option>
      <option value="1w">Last 1 week</option>
      <option value="1m">Last 1 month</option>
      <option value="custom">Custom range</option>
    </select>
    <span id="custom-range" class="hidden">
      <input type="datetime-local" id="range-from" aria-label="From date and time" />
      <span class="meta">→</span>
      <input type="datetime-local" id="range-to" aria-label="To date and time" />
    </span>
  </div>
  <label style="display:flex;align-items:center;gap:6px;color:var(--muted);font-size:13px;cursor:pointer;white-space:nowrap;">
    <input type="checkbox" id="hide-root" style="accent-color:var(--accent);"> Hide root
  </label>
  <span class="meta" id="meta"></span>
  <button class="primary" id="refresh">↻ Refresh</button>
</header>
<main>
  <div class="chips" id="chips"></div>
  <div class="chips-range" id="chips-range"></div>
  <section id="view-usage"></section>
  <section id="view-sessions" class="hidden"></section>
  <section id="view-tasks" class="hidden"></section>
  <section id="view-stats" class="hidden"></section>
</main>

<script>
const $ = (s) => document.querySelector(s);
// Durations are milliseconds. Show seconds (one decimal) under a minute, then
// switch to clock format — M:SS under an hour, H:MM:SS at/above an hour — so
// large totals stay readable instead of rendering as e.g. "1800.0s".
const sec = (ms) => {
  const s = Number(ms || 0) / 1000;
  if (s < 60) return s.toFixed(1) + 's';
  const total = Math.round(s);
  const h = Math.floor(total / 3600);
  const m = Math.floor((total % 3600) / 60);
  const ss = total % 60;
  const pad = (n) => String(n).padStart(2, '0');
  return h > 0 ? `${h}:${pad(m)}:${pad(ss)}` : `${m}:${pad(ss)}`;
};
const aic = (v) => Number(v||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
// Abbreviated form for summary chips only: 1.23K, 4.56M, etc.
const aicSummary = (v) => {
  const n = Number(v || 0);
  if (n >= 1e9) return (n / 1e9).toFixed(2) + 'B';
  if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(2) + 'K';
  return n.toFixed(2);
};
const num = (v) => Number(v||0).toLocaleString();
const esc = (s) => String(s).replace(/[&<>"]/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const pct = (v, max) => (max > 0 ? Math.max(2, Math.round((v/max)*100)) : 0);
const ts = (ms) => {
  if (ms == null) return '—';
  return new Date(Number(ms)).toLocaleString([], {
    month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit',
  });
};

let activeTab = 'usage';
// Recency-ordered pagination kicks in only past PAGE_SIZE items per view.
const PAGE_SIZE = 20;
let usageTree = [];
let usagePage = 1;
let selectedRepos = null;      // Set of repo names to show, or null = show all
let sessionsData = [];
let sessionsPage = 1;
let sessionsFilter = '';
let tasksData = [];
let tasksPage = 1;
let hideRoot = false;

function pageCount(total) { return Math.max(1, Math.ceil(total / PAGE_SIZE)); }

function pager(kind, total, page, noun) {
  if (pageCount(total) <= 1) return '';
  const pages = pageCount(total);
  const lo = (page - 1) * PAGE_SIZE + 1;
  const hi = Math.min(total, page * PAGE_SIZE);
  return `<div class="pager" data-kind="${kind}">
    <button data-dir="prev"${page <= 1 ? ' disabled' : ''}>← Prev</button>
    <span class="meta">${num(lo)}–${num(hi)} of ${num(total)} ${noun} · page ${page}/${pages}</span>
    <button data-dir="next"${page >= pages ? ' disabled' : ''}>Next →</button>
  </div>`;
}

function wirePager(kind, onPage) {
  document.querySelectorAll(`.pager[data-kind="${kind}"] button`).forEach((b) => {
    b.addEventListener('click', () => { if (!b.disabled) onPage(b.dataset.dir); });
  });
}

function chips(t, rangeLabel) {
  const c = [
    ['Sessions', num(t.sessions)], ['Phases', num(t.phases)],
    ['Subagents', num(t.subagents)], ['AI credits', aicSummary(t.aiu) + ' AIC'],
    ['Total time', sec(t.durationMs)],
  ];
  $('#chips').innerHTML = c.map(([k,v]) => `<div class="chip"><b>${v}</b><span>${k}</span></div>`).join('');
  $('#chips-range').textContent = rangeLabel ? `Showing: ${rangeLabel} · AI credits = top-level sessions only (subagents included in parent)` : '';
}

function nums(aiuVal, durMs) {
  return `<span class="nums"><span class="credit">${aic(aiuVal)} AIC</span>`
       + `<span class="dur">${sec(durMs)}</span></span>`;
}

function legend() {
  return `<details class="callout">
    <summary>What do these labels mean?</summary>
    <p>The tree breaks usage down as <b>📦 repo → 🌿 branch → phase</b>. The git
      repo and branch come from where the agent is working; each phase is a
      <code>skill</code> activation (or the implicit root work in between).</p>
    <dl>
      <dt>📦 <code>(unknown repo)</code></dt>
      <dd>No git repository could be detected for the session's working directory.</dd>
      <dt>🌿 branch name</dt>
      <dd>The git branch the work was attributed to (the session's branch, or a
        git worktree's branch if the agent wrote into one).</dd>
      <dt>🌿 <code>(no branch)</code></dt>
      <dd>No git branch could be detected (e.g. detached HEAD or a non-git directory).</dd>
      <dt><code>(root)</code></dt>
      <dd>Work in a task <i>outside</i> any superpowers skill — the implicit root
        phase that runs before, between, and after skill activations.</dd>
      <dt><code>unknown</code></dt>
      <dd>A skill was activated but its name could not be resolved from the tool
        call, so it is recorded under this placeholder.</dd>
    </dl>
  </details>`;
}

function repoItem(repo, repoMax) {
  const brMax = Math.max(...repo.branches.map(b => b.durationMs), 1);
  const branches = repo.branches.map((b) => {
    const visSkills = hideRoot ? b.skills.filter(s => s.skill !== '(root)') : b.skills;
    const skMax = Math.max(...visSkills.map(s => s.durationMs), 1);
    const skills = visSkills.map((s) => `
      <div class="skill-row">
        <span class="name sub grow">${esc(s.skill)} <span class="meta">×${s.count}</span>
          <span class="ts">· started ${ts(s.firstAt)}</span></span>
        <span class="bar"><i style="width:${pct(s.durationMs, skMax)}%"></i></span>
        ${nums(s.aiu, s.durationMs)}
      </div>`).join('');
    return `<details open>
      <summary>
        <span class="name grow">🌿 ${esc(b.feature)} <span class="ts">· started ${ts(b.firstAt)}</span></span>
        <span class="bar"><i style="width:${pct(b.durationMs, brMax)}%"></i></span>
        ${nums(b.aiu, b.durationMs)}
      </summary>${skills}</details>`;
  }).join('');
  return `<details open>
    <summary>
      <span class="name grow">📦 ${esc(repo.repo)} <span class="ts">· started ${ts(repo.firstAt)}</span></span>
      <span class="bar"><i style="width:${pct(repo.durationMs, repoMax)}%"></i></span>
      ${nums(repo.aiu, repo.durationMs)}
    </summary>${branches}</details>`;
}

// Multi-select repo filter (page 1 only). Re-rendering the tree body leaves this
// dropdown's DOM intact, so the menu stays open while several repos are toggled.
function repoFilterBar(tree) {
  if (tree.length <= 1) return '';
  const opts = tree.map((r) => {
    const checked = !selectedRepos || selectedRepos.has(r.repo) ? ' checked' : '';
    return `<label><input type="checkbox" value="${esc(r.repo)}"${checked}> ${esc(r.repo)}</label>`;
  }).join('');
  const shown = selectedRepos ? selectedRepos.size : tree.length;
  return `<details class="repofilter">
    <summary>📦 Repos · ${shown}/${tree.length} shown</summary>
    <div class="menu">
      <div class="menu-actions">
        <button type="button" data-act="all">Select all</button>
        <button type="button" data-act="none">Clear</button>
      </div>
      ${opts}
    </div>
  </details>`;
}

function wireRepoFilter() {
  const root = $('#view-usage .repofilter');
  if (!root) return;
  const apply = () => {
    const boxes = [...root.querySelectorAll('input[type="checkbox"]')];
    const checked = boxes.filter(b => b.checked).map(b => b.value);
    selectedRepos = checked.length === boxes.length ? null : new Set(checked);
    usagePage = 1;
    root.querySelector('summary').textContent =
      `📦 Repos · ${selectedRepos ? selectedRepos.size : boxes.length}/${boxes.length} shown`;
    renderUsageBody();
  };
  root.querySelectorAll('input[type="checkbox"]').forEach(b => b.addEventListener('change', apply));
  root.querySelectorAll('button[data-act]').forEach((btn) => btn.addEventListener('click', (e) => {
    e.preventDefault();
    const on = btn.dataset.act === 'all';
    root.querySelectorAll('input[type="checkbox"]').forEach(b => { b.checked = on; });
    apply();
  }));
}

function renderUsage(tree) {
  // Order repos by most-recent activity so the first page is the freshest work.
  usageTree = [...tree].sort((a, z) => (z.lastAt ?? 0) - (a.lastAt ?? 0));
  usagePage = 1;
  if (selectedRepos) {
    const names = new Set(usageTree.map(r => r.repo));
    selectedRepos = new Set([...selectedRepos].filter(n => names.has(n)));
    if (!selectedRepos.size) selectedRepos = null;
  }
  if (!usageTree.length) { $('#view-usage').innerHTML = legend() + '<div class="empty">No usage recorded yet.</div>'; return; }
  $('#view-usage').innerHTML = legend() + repoFilterBar(usageTree) + '<div id="usage-body"></div>';
  wireRepoFilter();
  renderUsageBody();
}

function renderUsageBody() {
  const filtered = selectedRepos ? usageTree.filter(r => selectedRepos.has(r.repo)) : usageTree;
  const total = filtered.length;
  if (usagePage > pageCount(total)) usagePage = pageCount(total);
  const start = (usagePage - 1) * PAGE_SIZE;
  const items = filtered.slice(start, start + PAGE_SIZE);
  let html;
  if (!items.length) {
    html = '<div class="empty">No usage for the selected repos.</div>';
  } else {
    // Scale bars to the longest repo on THIS page so they stay comparable.
    const repoMax = Math.max(...items.map(r => r.durationMs), 1);
    const controls = pager('usage', total, usagePage, 'repos');
    html = controls + items.map(r => repoItem(r, repoMax)).join('') + controls;
  }
  $('#usage-body').innerHTML = html;
  wirePager('usage', (dir) => { usagePage += dir === 'next' ? 1 : -1; renderUsageBody(); });
}

function sessionsLegend() {
  return `<details class="callout">
    <summary>What does this view show?</summary>
    <p>One entry per <b>🧵 session</b> (a single agent run), newest first. Each
      session shows its git <b>repo / branch</b> and model, with the <code>skill</code>
      phases it ran underneath — AI credit usage, duration (in seconds), and the
      <b>start time</b> at each level.</p>
    <dl>
      <dt>🧵 <code>(unknown repo)</code> / <code>(no branch)</code></dt>
      <dd>No git repository or branch could be detected for the session.</dd>
      <dt>🤖 <span class="child-badge">↳ subagent · AIC included in parent</span></dt>
      <dd>This session was launched as a subagent of another session. Its AI credits are
        already counted inside the parent's total — do <em>not</em> add them again when
        summing across sessions. The headline "AI credits" chip excludes child sessions to
        avoid double-counting.</dd>
      <dt><code>(root)</code></dt>
      <dd>Work in a task <i>outside</i> any superpowers skill — the implicit root
        phase that runs before, between, and after skill activations.</dd>
      <dt><code>unknown</code></dt>
      <dd>A skill was activated but its name could not be resolved from the tool
        call, so it is recorded under this placeholder.</dd>
    </dl>
  </details>`;
}

function sessionItem(se, seMax) {
  const isChild = !!se.parentSessionId;
  const visSkills = hideRoot ? se.skills.filter(s => s.skill !== '(root)') : se.skills;
  const skMax = Math.max(...visSkills.map(s => s.durationMs), 1);
  const sub = se.subagentCount
    ? ` · 🤖 ${num(se.subagentCount)} subagent${se.subagentCount === 1 ? '' : 's'}`
      + (se.subagentRunning ? ` (${num(se.subagentRunning)} running)` : '')
      + (se.subagentAiu != null ? ` · ${num(se.subagentAiu)} AIC total` : '')
    : '';
  const summary = `<div class="skill-row"><span class="meta grow">🔧 ${num(se.toolCount)} tool calls`
    + ` · ${sec(se.toolDurationMs)} in tools${sub}</span></div>`;
  const skills = visSkills.map((s) => `
    <div class="skill-row">
      <span class="name sub grow">${esc(s.skill)} <span class="meta">×${s.count}</span>
        <span class="ts">· started ${ts(s.firstAt)}</span></span>
      <span class="bar"><i style="width:${pct(s.durationMs, skMax)}%"></i></span>
      ${nums(s.aiu, s.durationMs)}
    </div>`).join('');
  const model = se.model ? ` <span class="meta">· ${esc(se.model)}</span>` : '';
  const headline = se.title ? esc(se.title) : `${esc(se.repo)} / ${esc(se.branch)}`;
  const where = se.title ? ` <span class="meta">· ${esc(se.repo)} / ${esc(se.branch)}</span>` : '';
  const childBadge = isChild ? ` <span class="child-badge">↳ subagent · AIC included in parent</span>` : '';
  const icon = isChild ? '🤖' : '🧵';
  const sessIdHtml = se.sessionId
    ? ` <code class="sess-id" title="${esc(se.sessionId)}">${esc(se.sessionId.substring(0, 8))}</code>`
    + ` <button type="button" class="view-tasks-btn" data-session="${esc(se.sessionId)}">→ Tasks</button>`
    : '';
  const numsHtml = isChild
    ? `<span class="nums"><span class="credit" title="Included in parent session's total">${aic(se.aiu)} AIC↑</span><span class="dur">${sec(se.durationMs)}</span></span>`
    : nums(se.aiu, se.durationMs);
  return `<details open class="${isChild ? 'child-session' : ''}">
    <summary>
      <span class="name grow">${icon} ${headline}${where}${model}${childBadge}${sessIdHtml}
        <span class="ts">· started ${ts(se.startedAt ?? se.firstAt)}</span></span>
      <span class="bar"><i style="width:${pct(se.durationMs, seMax)}%"></i></span>
      ${numsHtml}
    </summary>${summary}${skills}</details>`;
}

function tasksLegend() {
  return `<details class="callout">
    <summary>What does this view show?</summary>
    <p>One entry per <b>🎯 task</b> (a single user prompt turn), newest first. Each task shows
      the git <b>branch</b> it was attributed to (the worktree branch if the agent wrote into one),
      the <b>prompt excerpt</b> (if recorded), and the <code>skill</code> phases used — with AI
      credit usage and duration at each level.</p>
    <dl>
      <dt><code>(root)</code></dt>
      <dd>Work in a task <i>outside</i> any superpowers skill — the implicit root phase.</dd>
      <dt>Prompt excerpt</dt>
      <dd>First ~120 characters of the user prompt. Blank if <code>SUPERPOWERS_USAGE_NO_PROMPT=1</code>.</dd>
    </dl>
  </details>`;
}

function taskItem(tk, tkMax) {
  const visSkills = hideRoot ? tk.skills.filter(s => s.skill !== '(root)') : tk.skills;
  const skMax = Math.max(...visSkills.map(s => s.durationMs), 1);
  const skills = visSkills.map((s) => `
    <div class="skill-row">
      <span class="name sub grow">${esc(s.skill)} <span class="meta">×${s.count}</span>
        <span class="ts">· started ${ts(s.firstAt)}</span></span>
      <span class="bar"><i style="width:${pct(s.durationMs, skMax)}%"></i></span>
      ${nums(s.aiu, s.durationMs)}
    </div>`).join('');
  const excerpt = tk.promptExcerpt
    ? `<div class="skill-row"><span class="meta grow">💬 ${esc(tk.promptExcerpt)}</span></div>`
    : '';
  const headline = `🎯 ${esc(tk.feature)} / turn ${num(tk.turnIndex)}`;
  const where = tk.repo ? ` <span class="meta">· ${esc(tk.repo)}</span>` : '';
  return `<details open>
    <summary>
      <span class="name grow">${headline}${where}
        <span class="ts">· started ${ts(tk.startedAt ?? tk.firstAt)}</span></span>
      <span class="bar"><i style="width:${pct(tk.durationMs, tkMax)}%"></i></span>
      ${nums(tk.aiu, tk.durationMs)}
    </summary>${excerpt}${skills}</details>`;
}

function renderTasks(tasks) {
  tasksData = tasks;
  tasksPage = 1;
  if (!tasksData.length) {
    $('#tasks-body').innerHTML = '<div class="empty">No tasks found for this session.</div>';
    return;
  }
  $('#tasks-body').innerHTML = '<div id="tasks-list"></div>';
  renderTasksBody();
}

function renderTasksBody() {
  const container = document.getElementById('tasks-list') || $('#tasks-body');
  const total = tasksData.length;
  if (tasksPage > pageCount(total)) tasksPage = pageCount(total);
  const start = (tasksPage - 1) * PAGE_SIZE;
  const items = tasksData.slice(start, start + PAGE_SIZE);
  const tkMax = Math.max(...items.map(t => t.durationMs), 1);
  const controls = pager('tasks', total, tasksPage, 'tasks');
  container.innerHTML = controls + items.map(t => taskItem(t, tkMax)).join('') + controls;
  wirePager('tasks', (dir) => { tasksPage += dir === 'next' ? 1 : -1; renderTasksBody(); });
}

let tasksSessionId = null;
let tasksTabInited = false;

function initTasksTab() {
  if (tasksTabInited) return;
  tasksTabInited = true;
  $('#view-tasks').innerHTML = tasksLegend()
    + `<div class="tasksfilterbar">
        <input id="tasks-session" type="text" placeholder="Paste a session ID, or click → Tasks on a session…" aria-label="Session ID" spellcheck="false" autocomplete="off" />
        <button id="load-tasks-btn">Load</button>
        <span class="meta" id="tasks-session-meta"></span>
      </div>`
    + '<div id="tasks-body"><div class="empty">Select a session from the Sessions tab to view its tasks.</div></div>';
  $('#tasks-session').addEventListener('keydown', (e) => { if (e.key === 'Enter') triggerTasksLoad(); });
  $('#load-tasks-btn').addEventListener('click', triggerTasksLoad);
}

function triggerTasksLoad() {
  const sid = $('#tasks-session').value.trim();
  if (sid) loadTasksForSession(sid);
}

async function loadTasksForSession(sessionId) {
  initTasksTab();
  tasksSessionId = sessionId;
  const input = document.getElementById('tasks-session');
  if (input) input.value = sessionId;
  const metaEl = document.getElementById('tasks-session-meta');
  if (metaEl) metaEl.textContent = 'loading…';
  try {
    const range = currentRange();
    const qs = new URLSearchParams({ session: sessionId, t: String(Date.now()) });
    if (range.from != null) qs.set('from', String(Math.floor(range.from)));
    if (range.to != null) qs.set('to', String(Math.floor(range.to)));
    const tasks = await (await fetch('/api/tasks?' + qs.toString())).json();
    renderTasks(tasks);
    if (metaEl) metaEl.textContent = `${tasks.length} task${tasks.length === 1 ? '' : 's'}`;
  } catch (e) {
    if (metaEl) metaEl.textContent = 'error: ' + e.message;
  }
}

function renderSessions(sessions) {
  sessionsData = sessions;   // already newest-first from the report
  sessionsPage = 1;
  sessionsFilter = '';
  if (!sessionsData.length) { $('#view-sessions').innerHTML = sessionsLegend() + '<div class="empty">No sessions recorded yet.</div>'; return; }
  $('#view-sessions').innerHTML = sessionsLegend()
    + `<div class="sessfilterbar">
        <input id="sess-filter" type="search" placeholder="Filter by title, repo, or branch…" aria-label="Filter sessions" />
        <span class="meta" id="sess-filter-meta"></span>
      </div>`
    + '<div id="sessions-body"></div>';
  $('#sess-filter').addEventListener('input', () => {
    sessionsFilter = $('#sess-filter').value.trim().toLowerCase();
    sessionsPage = 1;
    renderSessionsBody();
  });
  renderSessionsBody();
}

function filteredSessions() {
  if (!sessionsFilter) return sessionsData;
  return sessionsData.filter((se) => {
    const hay = [se.title, se.repo, se.branch].filter(Boolean).join(' ').toLowerCase();
    return hay.includes(sessionsFilter);
  });
}

function renderSessionsBody() {
  const filtered = filteredSessions();
  const total = filtered.length;
  if (sessionsPage > pageCount(total)) sessionsPage = pageCount(total);
  const start = (sessionsPage - 1) * PAGE_SIZE;
  const items = filtered.slice(start, start + PAGE_SIZE);
  // Scale bars to the longest session on THIS page, so an off-page long-running
  // outlier no longer flattens every visible bar to the 2% minimum.
  const seMax = Math.max(...items.map(s => s.durationMs), 1);
  const controls = pager('sessions', total, sessionsPage, 'sessions');
  const metaEl = $('#sess-filter-meta');
  if (metaEl) metaEl.textContent = sessionsFilter ? `${total} of ${sessionsData.length} sessions` : '';
  if (!items.length) {
    $('#sessions-body').innerHTML = '<div class="empty">No sessions match the filter.</div>';
    return;
  }
  $('#sessions-body').innerHTML = controls + items.map(se => sessionItem(se, seMax)).join('') + controls;
  wirePager('sessions', (dir) => { sessionsPage += dir === 'next' ? 1 : -1; renderSessionsBody(); });
  document.querySelectorAll('.view-tasks-btn').forEach((btn) => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      setTab('tasks');
      loadTasksForSession(btn.dataset.session);
    });
  });
}

// --- Stats tab: sortable + filterable analysis tables ----------------------
// The Stats tab is for ad-hoc analysis of AI credits (AIC) and duration, so
// every column is click-to-sort and the whole view is name-filterable. Data
// comes straight from the report; sorting/filtering is pure client-side.
const pctTxt = (v) => (Number(v || 0)).toFixed(0) + '%';
const avgTxt = (v) => (v == null ? '—' : sec(v));
const pctlTxt = (v) => (v == null ? '—' : sec(v));

const STAT_DEFS = {
  tools: {
    title: 'Top tools', name: 'name', sort: 'count',
    cols: [
      { key: 'name', label: 'Tool', type: 'text', td: 'text', fmt: (v) => esc(v) },
      { key: 'count', label: 'Count', type: 'num', td: 'num', fmt: num },
      { key: 'p75Ms', label: 'P75', type: 'num', td: 'num', fmt: pctlTxt },
      { key: 'p95Ms', label: 'P95', type: 'num', td: 'num', fmt: pctlTxt },
      { key: 'totalMs', label: 'Total (sum)', type: 'num', td: 'num', fmt: sec },
      { key: 'lastAt', label: 'Last active', type: 'num', td: 'ts', fmt: ts },
    ],
  },
  skills: {
    title: 'Superpowers phases (skills)', name: 'skill', sort: 'totalMs',
    cols: [
      { key: 'skill', label: 'Skill', type: 'text', td: 'text', fmt: (v) => esc(v) },
      { key: 'count', label: 'Runs', type: 'num', td: 'num', fmt: num },
      { key: 'totalMs', label: 'Total', type: 'num', td: 'num', fmt: sec },
      { key: 'avgMs', label: 'Avg', type: 'num', td: 'num', fmt: sec },
      { key: 'aiu', label: 'AIC', type: 'num', td: 'num', fmt: aic },
      { key: 'firstAt', label: 'Started', type: 'num', td: 'ts', fmt: ts },
      { key: 'lastAt', label: 'Last active', type: 'num', td: 'ts', fmt: ts },
    ],
  },
  subagents: {
    title: 'Subagents', name: 'name', sort: 'totalMs',
    cols: [
      { key: 'name', label: 'Agent', type: 'text', td: 'text', fmt: (v) => esc(v) },
      { key: 'count', label: 'Total', type: 'num', td: 'num', fmt: num },
      { key: 'running', label: 'Running', type: 'num', td: 'num', fmt: num },
      { key: 'totalMs', label: 'Total dur', type: 'num', td: 'num', fmt: sec },
      { key: 'avgMs', label: 'Avg (reliable)', type: 'num', td: 'num', fmt: avgTxt },
      { key: 'maxMs', label: 'Max', type: 'num', td: 'num', fmt: sec },
      { key: 'share', label: 'Share', type: 'num', td: 'num', fmt: pctTxt },
      { key: 'firstAt', label: 'Started', type: 'num', td: 'ts', fmt: ts },
      { key: 'lastAt', label: 'Last active', type: 'num', td: 'ts', fmt: ts },
    ],
  },
};

const statsSort = {
  tools: { key: 'count', dir: -1 },
  skills: { key: 'totalMs', dir: -1 },
  subagents: { key: 'totalMs', dir: -1 },
};
let statsReport = null;
let statsFilter = '';

function sortRows(rows, key, dir) {
  return rows.slice().sort((a, b) => {
    const x = a[key]; const y = b[key];
    if (x == null && y == null) return 0;
    if (x == null) return 1;            // nulls (e.g. unreliable avg) sort last
    if (y == null) return -1;
    if (typeof x === 'string' || typeof y === 'string') {
      return String(x).localeCompare(String(y)) * dir;
    }
    return (x - y) * dir;
  });
}

function statTable(id, def, rows) {
  if (!rows.length) return '';
  const st = statsSort[id];
  const sorted = sortRows(rows, st.key, st.dir);
  const head = def.cols.map((c) => {
    const numCls = c.td === 'num' ? ' num' : '';
    const isSorted = c.key === st.key;
    const arrow = isSorted ? (st.dir < 0 ? '▼' : '▲') : '▲';
    const ariaSort = isSorted ? (st.dir < 0 ? 'descending' : 'ascending') : 'none';
    return `<th class="sortable${numCls}${isSorted ? ' sorted' : ''}" `
         + `data-table="${id}" data-key="${c.key}" data-type="${c.type}" `
         + `tabindex="0" aria-sort="${ariaSort}">`
         + `${c.label}<span class="arrow" aria-hidden="true">${arrow}</span></th>`;
  }).join('');
  const body = sorted.map((rw) => {
    const cells = def.cols.map((c) => {
      const cls = c.td === 'num' ? ' class="num"' : c.td === 'ts' ? ' class="ts"' : '';
      return `<td${cls}>${c.fmt(rw[c.key], rw)}</td>`;
    }).join('');
    return `<tr>${cells}</tr>`;
  }).join('');
  return `<h2>${def.title}</h2><table><tr>${head}</tr>${body}</table>`;
}

function filterRows(rows, nameKey) {
  if (!statsFilter) return rows;
  return rows.filter((x) => String(x[nameKey]).toLowerCase().includes(statsFilter));
}

function renderStatsTables() {
  const r = statsReport;
  if (!r) return;
  const sets = [
    ['tools', filterRows(r.tools, STAT_DEFS.tools.name)],
    ['skills', filterRows(r.skills, STAT_DEFS.skills.name)],
    ['subagents', filterRows(r.subagents, STAT_DEFS.subagents.name)],
  ];
  const html = sets.map(([id, rows]) => statTable(id, STAT_DEFS[id], rows)).join('');
  const empty = r.tools.length + r.skills.length + r.subagents.length === 0;
  $('#stats-tables').innerHTML = html
    || (empty ? '<div class="empty">No stats yet.</div>' : '<div class="empty">No rows match the filter.</div>');
  const total = r.tools.length + r.skills.length + r.subagents.length;
  const shown = sets.reduce((acc, [, rows]) => acc + rows.length, 0);
  $('#stat-filter-meta').textContent = statsFilter ? `${shown} of ${total} rows` : '';
}

function onStatsHeaderClick(e) {
  const th = e.target.closest('th.sortable');
  if (!th) return;
  const st = statsSort[th.dataset.table];
  if (st.key === th.dataset.key) st.dir = -st.dir;
  else { st.key = th.dataset.key; st.dir = th.dataset.type === 'text' ? 1 : -1; }
  renderStatsTables();
}

function onStatsHeaderKeydown(e) {
  if (e.key !== 'Enter' && e.key !== ' ') return;
  const th = e.target.closest('th.sortable');
  if (!th) return;
  e.preventDefault();
  // After re-render, restore focus to the same column header.
  const { table, key } = th.dataset;
  onStatsHeaderClick(e);
  const restored = document.querySelector(`th.sortable[data-table="${table}"][data-key="${key}"]`);
  if (restored) restored.focus();
}

function renderStats(r) {
  // Each subagent's share of total reliable subagent time (computed over the
  // full set so the percentage stays absolute while filtering/sorting).
  const grand = r.subagents.reduce((s, a) => s + Number(a.totalMs || 0), 0) || 1;
  r.subagents.forEach((a) => { a.share = Number(a.totalMs || 0) / grand * 100; });
  statsReport = r;
  if (!$('#stat-filter')) {
    $('#view-stats').innerHTML =
      `<div class="filterbar">
        <input id="stat-filter" type="search" placeholder="Filter tools, skills & subagents by name…" />
        <span class="meta" id="stat-filter-meta"></span>
      </div><div id="stats-tables"></div>`;
    $('#stat-filter').addEventListener('input', () => {
      statsFilter = $('#stat-filter').value.trim().toLowerCase();
      renderStatsTables();
    });
    $('#stats-tables').addEventListener('click', onStatsHeaderClick);
    $('#stats-tables').addEventListener('keydown', onStatsHeaderKeydown);
  }
  renderStatsTables();
}

// Compute {from, to} millisecond bounds from the current timeline selection.
// Returns nulls for an open bound (e.g. "All time" -> {from:null, to:null}).
function currentRange() {
  const preset = $('#range-preset').value;
  const now = Date.now();
  const HOUR = 3600000;
  const DAY = 86400000;
  if (preset === '1h') return { from: now - HOUR, to: null };
  if (preset === '1d') return { from: now - DAY, to: null };
  if (preset === '1w') return { from: now - 7 * DAY, to: null };
  if (preset === '1m') return { from: now - 30 * DAY, to: null };
  if (preset === 'custom') {
    const fromVal = $('#range-from').value;
    const toVal = $('#range-to').value;
    // datetime-local values ("YYYY-MM-DDTHH:MM") parse as local time.
    const from = fromVal ? new Date(fromVal).getTime() : null;
    const to = toVal ? new Date(toVal).getTime() : null;
    return {
      from: Number.isFinite(from) ? from : null,
      to: Number.isFinite(to) ? to : null,
    };
  }
  return { from: null, to: null };
}

function rangeLabel(range) {
  const fmt = (ms) => new Date(ms).toLocaleString([], {
    month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit',
  });
  const f = range.from != null ? fmt(range.from) : null;
  const t = range.to != null ? fmt(range.to) : null;
  if (!f && !t) return 'all time';
  if (f && !t) return `since ${f}`;
  if (!f && t) return `through ${t}`;
  return `${f} – ${t}`;
}

async function load() {
  $('#refresh').disabled = true;
  $('#meta').textContent = 'loading…';
  const range = currentRange();
  const qs = new URLSearchParams({ t: String(Date.now()) });
  if (range.from != null) qs.set('from', String(Math.floor(range.from)));
  if (range.to != null) qs.set('to', String(Math.floor(range.to)));
  try {
    const r = await (await fetch('/api/report?' + qs.toString())).json();
    const label = rangeLabel(range);
    chips(r.totals, label);
    renderUsage(r.tree);
    renderSessions(r.sessions);
    initTasksTab();
    if (tasksSessionId) loadTasksForSession(tasksSessionId);
    renderStats(r);
    const when = new Date(r.generatedAt).toLocaleTimeString();
    $('#meta').textContent = `${r.dbPath || ''} · ${label} · updated ${when}`;
  } catch (e) {
    $('#meta').textContent = 'error: ' + e.message;
  } finally {
    $('#refresh').disabled = false;
  }
}

function setTab(name) {
  activeTab = name;
  document.querySelectorAll('.tab').forEach(t => {
    const active = t.dataset.tab === name;
    t.classList.toggle('active', active);
    t.setAttribute('aria-selected', active ? 'true' : 'false');
    t.setAttribute('tabindex', active ? '0' : '-1');
  });
  $('#view-usage').classList.toggle('hidden', name !== 'usage');
  $('#view-sessions').classList.toggle('hidden', name !== 'sessions');
  $('#view-tasks').classList.toggle('hidden', name !== 'tasks');
  $('#view-stats').classList.toggle('hidden', name !== 'stats');
}

document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => setTab(t.dataset.tab)));
document.querySelector('.tabs').addEventListener('keydown', (e) => {
  const tabs = [...document.querySelectorAll('.tab')];
  const idx = tabs.indexOf(document.activeElement);
  if (idx < 0) return;
  let next = -1;
  if (e.key === 'ArrowRight') next = (idx + 1) % tabs.length;
  else if (e.key === 'ArrowLeft') next = (idx - 1 + tabs.length) % tabs.length;
  else if (e.key === 'Home') next = 0;
  else if (e.key === 'End') next = tabs.length - 1;
  if (next < 0) return;
  e.preventDefault();
  tabs[next].focus();
  setTab(tabs[next].dataset.tab);
});
$('#refresh').addEventListener('click', load);
$('#hide-root').addEventListener('change', () => {
  hideRoot = $('#hide-root').checked;
  if ($('#usage-body'))    renderUsageBody();
  if ($('#sessions-body')) renderSessionsBody();
  if ($('#tasks-body') && tasksData.length) renderTasksBody();
});

const presetEl = $('#range-preset');
const customEl = $('#custom-range');
presetEl.addEventListener('change', () => {
  const isCustom = presetEl.value === 'custom';
  customEl.classList.toggle('hidden', !isCustom);
  // Custom waits for the user to pick dates; presets reload immediately.
  if (!isCustom) load();
});
$('#range-from').addEventListener('change', load);
$('#range-to').addEventListener('change', load);

load();
</script>
</body>
</html>
